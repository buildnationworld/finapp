services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pesapilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pesapilot
      POSTGRES_PASSWORD: pesapilot
      POSTGRES_DB: pesapilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pesapilot -d pesapilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pesapilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
